<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureBank – Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page-wide">

  <!-- Header row -->
  <div class="admin-header-row">
    <div class="bank-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2L2 7v2h20V7L12 2zm-8 9v6H2v2h20v-2h-2v-6h-2v6h-4v-6h-2v6H8v-6H4zm8-5a1 1 0 110 2 1 1 0 010-2z"/>
        </svg>
      </div>
      <span class="bank-name">SecureBank</span>
      <span style="font-size:13px;color:#6b7a90;margin-left:4px;">/ Admin</span>
    </div>

   
    <a href="register.html">
      <button class="btn btn-primary" style="width:auto;padding:0 16px;font-size:13px;height:36px;">+ Register User</button>
    </a>
    <button class="btn btn-danger" style="width:auto;padding:0 16px;font-size:13px;height:36px;" onclick="logout()">Logout</button>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label">Total Attempts</div>
      <div class="summary-value" id="stat-total">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Locked Accounts</div>
      <div class="summary-value danger" id="stat-locked">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Alerts Sent</div>
      <div class="summary-value" id="stat-alerts">0</div>
    </div>
  </div>

  <div class="table-panel">
    <div class="table-toolbar">
      <h2>Failed Login Attempts</h2>
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="Filter by username..."
        oninput="filterTable()"
        aria-label="Filter by username"
      />
      <button class="btn btn-danger" onclick="clearAllRecords()">
        Clear All Records
      </button>
    </div>

    <div class="table-wrap">
      <table id="attempts-table" aria-label="Failed login attempts">
        <thead>
          <tr>
            <th>Attempt ID</th>
            <th>Username</th>
            <th>IP Address</th>
            <th>Date &amp; Time</th>
            <th>Status</th>
            <th>Alert Sent</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>

      <div class="empty-state" id="empty-state" style="display:none">
        No failed login attempts recorded yet.
      </div>
      <div class="empty-state" id="no-results" style="display:none">
        No records match your search.
      </div>
    </div>
  </div>

</div>

<script>
  // Session protection — redirect to login if not authenticated
  if (sessionStorage.getItem('sb_admin') !== 'true') {
    window.location.href = 'login.html';
  }

  // Logout — clear session and redirect
  function logout() {
    sessionStorage.removeItem('sb_admin');
    window.location.href = 'login.html';
  }

  let allRecords = [];

  window.addEventListener('DOMContentLoaded', function () {
    loadRecords();
  });

  function loadRecords() {
    const raw = localStorage.getItem('sb_attempts');
    allRecords = raw ? JSON.parse(raw) : [];
    updateSummaryCards();
    renderTable(allRecords);
  }

  function updateSummaryCards() {
    const total = allRecords.length;

    const alerts = allRecords.filter(function (r) {
      return r.alertSent === 'Yes';
    }).length;

    const userCounts = {};
    allRecords.forEach(function (r) {
      userCounts[r.username] = (userCounts[r.username] || 0) + 1;
    });
    const locked = Object.values(userCounts).filter(function (c) {
      return c >= 5;
    }).length;

    document.getElementById('stat-total').textContent  = total;
    document.getElementById('stat-locked').textContent = locked;
    document.getElementById('stat-alerts').textContent = alerts;
  }

  function renderTable(records) {
    const tbody   = document.getElementById('table-body');
    const emptyEl = document.getElementById('empty-state');
    const noResEl = document.getElementById('no-results');

    tbody.innerHTML = '';

    if (allRecords.length === 0) {
      emptyEl.style.display = 'block';
      noResEl.style.display = 'none';
      return;
    }

    if (records.length === 0) {
      emptyEl.style.display = 'none';
      noResEl.style.display = 'block';
      return;
    }

    emptyEl.style.display = 'none';
    noResEl.style.display = 'none';

    const userCounts = {};
    allRecords.forEach(function (r) {
      userCounts[r.username] = (userCounts[r.username] || 0) + 1;
    });

    records.forEach(function (record) {
      const isLocked = (userCounts[record.username] || 0) >= 5;

      const dt = new Date(record.timestamp);
      const formattedDate = dt.toLocaleDateString(undefined, {
        year: 'numeric', month: 'short', day: 'numeric'
      }) + ' ' + dt.toLocaleTimeString(undefined, {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });

      const tr = document.createElement('tr');
      if (isLocked) tr.classList.add('locked-row');

      tr.innerHTML =
        '<td style="font-family:monospace;font-size:12px;color:#6b7a90">' + escapeHtml(record.id) + '</td>' +
        '<td><strong>' + escapeHtml(record.username) + '</strong>' +
          (isLocked ? ' <span style="font-size:11px;color:#881a1a;font-weight:600;">(Locked)</span>' : '') +
        '</td>' +
        '<td style="font-family:monospace;font-size:13px;">' + escapeHtml(record.ipAddress) + '</td>' +
        '<td style="white-space:nowrap">' + escapeHtml(formattedDate) + '</td>' +
        '<td><span class="badge badge-fail">' + escapeHtml(record.status) + '</span></td>' +
        '<td><span class="badge badge-yes">' + escapeHtml(record.alertSent) + '</span></td>';

      tbody.appendChild(tr);
    });
  }

  function filterTable() {
    const query = document.getElementById('search-input').value.toLowerCase().trim();
    if (query === '') {
      renderTable(allRecords);
      return;
    }
    const filtered = allRecords.filter(function (r) {
      return r.username.toLowerCase().includes(query);
    });
    renderTable(filtered);
  }

  function clearAllRecords() {
    if (!confirm('Are you sure you want to delete all failed login attempt records? This cannot be undone.')) {
      return;
    }
    localStorage.removeItem('sb_attempts');
    allRecords = [];
    document.getElementById('search-input').value = '';
    updateSummaryCards();
    renderTable(allRecords);
  }

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
</script>

</body>
</html>
